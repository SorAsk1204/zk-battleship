# ZK Battleship — static SPA on :8080 + same-origin JSON-RPC proxy to the GoQuorum node.
# Isolated on its own port; does not touch the existing :80 / :443 sites.
server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /var/www/battleship;
    index index.html;

    # hashed build assets (incl. the ~17MB zk wasm/zkey under /zk) — cache hard
    location /assets/ { try_files $uri =404; access_log off; expires 7d; }
    location /zk/     { try_files $uri =404; access_log off; expires 7d; }

    # JSON-RPC → GoQuorum node0 http; trailing slash strips the /rpc prefix so upstream sees POST /
    location /rpc {
        proxy_pass http://127.0.0.1:8545/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 4m;
    }

    # SPA fallback
    location / { try_files $uri $uri/ /index.html; }
}
